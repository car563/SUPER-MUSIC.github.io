<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unblockify Player</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <style>
        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #4b5563;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #6b7280;
        }

        /* Audio Playing Bounce Animation */
        @keyframes bounce-audio {
            0%, 100% { transform: scaleY(0.5); }
            50% { transform: scaleY(1); }
        }
        .animate-bounce-audio-1 { animation: bounce-audio 1s infinite ease-in-out; transform-origin: bottom; }
        .animate-bounce-audio-2 { animation: bounce-audio 1.2s infinite ease-in-out; transform-origin: bottom; }
        .animate-bounce-audio-3 { animation: bounce-audio 0.8s infinite ease-in-out; transform-origin: bottom; }

        .ph-fill { color: inherit; }
        .ph { color: inherit; }
        
        /* Hide elements utility */
        .hidden-safely { display: none !important; }
    </style>
</head>
<body class="bg-[#121212] text-gray-300 font-sans overflow-hidden selection:bg-green-500 selection:text-white h-screen flex flex-col">

    <!-- Media Player Element (Handles both Audio and Video) -->
    <div id="videoContainer" class="fixed bottom-24 right-4 md:right-8 w-64 md:w-80 aspect-video bg-black rounded-lg shadow-[0_0_40px_rgba(0,0,0,0.5)] border border-gray-700 z-50 overflow-hidden transition-all duration-300 opacity-0 translate-y-10 pointer-events-none">
        <button onclick="toggleVideoVisibility(false)" class="absolute top-2 right-2 z-10 bg-black/60 p-1 rounded-full text-white hover:bg-black transition-colors">
            <i class="ph ph-x"></i>
        </button>
        <video id="mediaPlayer" class="w-full h-full object-contain cursor-pointer" playsinline></video>
    </div>

    <div class="flex flex-1 overflow-hidden relative">
        <!-- Mobile Sidebar Overlay -->
        <div id="sidebarOverlay" class="absolute inset-0 bg-black/60 z-20 md:hidden hidden-safely" onclick="toggleSidebar(false)"></div>

        <!-- Sidebar -->
        <aside id="sidebar" class="absolute md:relative z-30 w-64 bg-black h-full flex flex-col transition-transform duration-300 ease-in-out -translate-x-full md:translate-x-0">
            <div class="p-6 flex items-center justify-between">
                <div class="flex items-center gap-2 text-white font-bold text-xl tracking-tight">
                    <div class="w-8 h-8 bg-green-500 rounded-full flex items-center justify-center">
                        <i class="ph-fill ph-music-notes text-black text-lg"></i>
                    </div>
                    Unblockify
                </div>
                <button class="md:hidden text-gray-400 hover:text-white" onclick="toggleSidebar(false)">
                    <i class="ph ph-x text-2xl"></i>
                </button>
            </div>
            
            <nav class="flex-1 px-4 space-y-2">
                <button onclick="navigate('home')" id="navHome" class="flex items-center gap-4 text-gray-300 hover:text-white hover:bg-gray-800/50 w-full p-3 rounded-lg transition-colors font-medium bg-gray-800/50 text-white">
                    <i class="ph-fill ph-house text-xl"></i> Home
                </button>
                <button onclick="navigate('search')" id="navSearch" class="flex items-center gap-4 text-gray-300 hover:text-white hover:bg-gray-800/50 w-full p-3 rounded-lg transition-colors font-medium cursor-pointer">
                    <i class="ph ph-magnifying-glass text-xl"></i> Search
                </button>
                <button onclick="navigate('library')" id="navLibrary" class="flex items-center gap-4 text-gray-300 hover:text-white hover:bg-gray-800/50 w-full p-3 rounded-lg transition-colors font-medium cursor-pointer">
                    <i class="ph-fill ph-books text-xl"></i> Your Library
                </button>
            </nav>
            
            <div class="p-6 text-xs text-gray-500">
                <p>Powered by iTunes API.</p>
                <p class="mt-1">Provides high-quality previews to bypass standard network blocks.</p>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 flex flex-col h-full overflow-hidden bg-gradient-to-b from-gray-800/40 to-[#121212]">
            <!-- Header -->
            <header class="h-16 flex items-center px-6 gap-4 sticky top-0 bg-[#121212]/80 backdrop-blur-md z-10">
                <button class="md:hidden text-gray-300 hover:text-white" onclick="toggleSidebar(true)">
                    <i class="ph ph-list text-2xl"></i>
                </button>
                
                <form id="searchForm" class="flex-1 max-w-md relative flex items-center gap-2">
                    <div class="relative flex-1">
                        <i class="ph ph-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-lg"></i>
                        <input 
                            id="searchInput"
                            type="text" 
                            placeholder="What do you want to listen to?"
                            class="w-full bg-[#242424] text-white text-sm rounded-full py-2.5 pl-10 pr-4 focus:outline-none focus:ring-2 focus:ring-green-500/50 focus:bg-[#2a2a2a] transition-all placeholder:text-gray-400"
                        />
                    </div>
                    <div class="hidden sm:flex bg-[#242424] rounded-full p-1">
                        <button type="button" id="btnTypeSong" onclick="setSearchType('song')" class="px-3 py-1.5 text-xs font-medium rounded-full transition-colors bg-gray-600 text-white">
                            Songs
                        </button>
                        <button type="button" id="btnTypeVideo" onclick="setSearchType('musicVideo')" class="px-3 py-1.5 text-xs font-medium rounded-full transition-colors text-gray-400 hover:text-white">
                            Videos
                        </button>
                    </div>
                </form>
            </header>

            <!-- Track List / Content Area -->
            <div id="contentArea" class="flex-1 overflow-y-auto p-6">
                <!-- Content injected via JS -->
            </div>
        </main>
    </div>

    <!-- Bottom Player Bar -->
    <footer class="h-20 bg-[#181818] border-t border-[#282828] flex items-center justify-between px-4 sm:px-6 relative z-40 shrink-0">
        <!-- Now Playing Info -->
        <div id="nowPlayingInfo" class="flex items-center gap-4 w-1/3 min-w-0">
            <div class="text-xs text-gray-500">Select a song to start listening</div>
        </div>

        <!-- Controls -->
        <div class="flex flex-col items-center justify-center max-w-xl w-1/3 gap-2">
            <div class="flex items-center gap-6">
                <button id="btnPrev" class="text-gray-400 hover:text-white transition-colors disabled:opacity-50" disabled onclick="handleSkipBack()">
                    <i class="ph-fill ph-skip-back text-xl"></i>
                </button>
                <button id="btnPlayPause" class="w-8 h-8 flex items-center justify-center bg-white text-black rounded-full hover:scale-105 transition-transform disabled:opacity-50 disabled:hover:scale-100" disabled onclick="togglePlayPause()">
                    <i class="ph-fill ph-play ml-0.5 text-lg" id="playPauseIcon"></i>
                </button>
                <button id="btnNext" class="text-gray-400 hover:text-white transition-colors disabled:opacity-50" disabled onclick="handleSkipForward()">
                    <i class="ph-fill ph-skip-forward text-xl"></i>
                </button>
            </div>
            
            <div class="w-full flex items-center gap-2 text-xs text-gray-400">
                <span id="timeCurrent" class="w-8 text-right">0:00</span>
                <input 
                    id="progressSlider"
                    type="range" 
                    min="0" 
                    max="100" 
                    value="0"
                    disabled
                    oninput="handleSeek(event)"
                    class="flex-1 h-1 bg-gray-600 rounded-full appearance-none cursor-pointer accent-green-500 hover:accent-green-400"
                />
                <span id="timeTotal" class="w-8">0:00</span>
            </div>
        </div>

        <!-- Volume -->
        <div class="flex items-center justify-end w-1/3 gap-3">
            <button onclick="toggleMute()" class="text-gray-400 hover:text-white transition-colors">
                <i id="volumeIcon" class="ph-fill ph-speaker-high text-xl"></i>
            </button>
            <input 
                id="volumeSlider"
                type="range" 
                min="0" 
                max="1" 
                step="0.01"
                value="1"
                oninput="handleVolumeChange(event)"
                class="w-24 h-1 hidden sm:block bg-gray-600 rounded-full appearance-none cursor-pointer accent-white hover:accent-green-500"
            />
        </div>
    </footer>

    <!-- Application Logic -->
    <script>
        // --- State Management ---
        const state = {
            query: '',
            results: [],
            loading: false,
            currentTrack: null,
            isPlaying: false,
            currentView: 'search', // 'search', 'artist', 'library'
            selectedArtist: null,
            artistTracks: [],
            likedTracks: [],
            searchType: 'song',
            showVideo: true,
            volume: 1,
            isMuted: false,
            duration: 0
        };

        // Cache for all tracks encountered to easily retrieve by ID
        const trackCache = new Map();

        // DOM Elements
        const mediaPlayer = document.getElementById('mediaPlayer');
        const contentArea = document.getElementById('contentArea');
        const searchInput = document.getElementById('searchInput');
        const searchForm = document.getElementById('searchForm');
        
        // Load initial liked tracks
        try {
            const stored = localStorage.getItem('likedTracks');
            if (stored) {
                state.likedTracks = JSON.parse(stored);
                state.likedTracks.forEach(t => trackCache.set(t.trackId, t));
            }
        } catch(e) { console.error('Could not load liked tracks', e); }

        // --- Initialization ---
        window.onload = () => {
            setupMediaListeners();
            fetchMusic('top hits');
            
            searchForm.addEventListener('submit', (e) => {
                e.preventDefault();
                state.query = searchInput.value;
                fetchMusic(state.query || 'top hits', state.searchType);
            });

            mediaPlayer.addEventListener('click', togglePlayPause);
        };

        // --- Core Functions ---
        async function fetchMusic(searchTerm, type = state.searchType) {
            if (!searchTerm.trim()) return;
            
            state.loading = true;
            state.currentView = 'search';
            renderContent();

            try {
                const response = await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(searchTerm)}&entity=${type}&limit=50`);
                if (!response.ok) throw new Error('Network response was not ok');
                const data = await response.json();
                
                state.results = data.results;
                state.results.forEach(t => trackCache.set(t.trackId, t));
                state.loading = false;
                renderContent();
            } catch (err) {
                console.error(err);
                state.loading = false;
                renderError('Failed to load music. Please try again.');
            }
        }

        async function fetchArtistProfile(artistId, artistName) {
            state.loading = true;
            state.currentView = 'artist';
            renderContent();

            try {
                const response = await fetch(`https://itunes.apple.com/lookup?id=${artistId}&entity=song&limit=50`);
                if (!response.ok) throw new Error('Network response was not ok');
                const data = await response.json();
                
                state.selectedArtist = data.results.find(item => item.wrapperType === 'artist') || { artistName, primaryGenreName: '' };
                state.artistTracks = data.results.filter(item => item.wrapperType === 'track');
                state.artistTracks.forEach(t => trackCache.set(t.trackId, t));
                
                state.loading = false;
                renderContent();
            } catch (err) {
                console.error(err);
                state.loading = false;
                renderError('Failed to load artist profile. Please try again.');
            }
        }

        // --- Playback Controls ---
        function playTrackById(trackId) {
            const track = trackCache.get(trackId);
            if (!track) return;
            
            state.currentTrack = track;
            
            if (!track.previewUrl) {
                console.error("No preview URL available for this track.");
                state.isPlaying = false;
                updatePlayerUI();
                return;
            }

            if (track.kind === 'music-video') {
                state.showVideo = true;
            }

            mediaPlayer.pause();
            mediaPlayer.src = track.previewUrl;
            mediaPlayer.load();
            
            const playPromise = mediaPlayer.play();
            if (playPromise !== undefined) {
                playPromise.then(() => {
                    state.isPlaying = true;
                    updatePlayerUI();
                    renderContent(); // Update playing state in list
                }).catch(err => {
                    console.error("Playback error:", err);
                    state.isPlaying = false;
                    updatePlayerUI();
                    renderContent();
                });
            } else {
                state.isPlaying = true;
                updatePlayerUI();
                renderContent();
            }
        }

        function togglePlayPause() {
            if (!state.currentTrack) return;
            
            if (state.isPlaying) {
                mediaPlayer.pause();
                state.isPlaying = false;
            } else {
                const playPromise = mediaPlayer.play();
                if (playPromise !== undefined) {
                    playPromise.then(() => {
                        state.isPlaying = true;
                        updatePlayerUI();
                        renderContent();
                    }).catch(err => {
                        console.error("Playback error:", err);
                        state.isPlaying = false;
                        updatePlayerUI();
                        renderContent();
                    });
                    return; // exit early, let promise handle UI
                } else {
                     state.isPlaying = true;
                }
            }
            updatePlayerUI();
            renderContent();
        }

        function getActiveList() {
            if (state.currentView === 'artist') return state.artistTracks;
            if (state.currentView === 'library') return state.likedTracks;
            return state.results;
        }

        function handleSkipForward() {
            if (!state.currentTrack) return;
            const activeList = getActiveList();
            const currentIndex = activeList.findIndex(t => t.trackId === state.currentTrack.trackId);
            if (currentIndex !== -1 && currentIndex < activeList.length - 1) {
                playTrackById(activeList[currentIndex + 1].trackId);
            }
        }

        function handleSkipBack() {
            if (!state.currentTrack) return;
            const activeList = getActiveList();
            const currentIndex = activeList.findIndex(t => t.trackId === state.currentTrack.trackId);
            if (currentIndex > 0) {
                playTrackById(activeList[currentIndex - 1].trackId);
            }
        }

        function setupMediaListeners() {
            mediaPlayer.addEventListener('timeupdate', () => {
                const progressSlider = document.getElementById('progressSlider');
                const timeCurrent = document.getElementById('timeCurrent');
                
                if (mediaPlayer.duration) {
                    const percent = (mediaPlayer.currentTime / mediaPlayer.duration) * 100;
                    progressSlider.value = percent;
                    timeCurrent.innerText = formatTime(mediaPlayer.currentTime);
                }
            });

            mediaPlayer.addEventListener('loadedmetadata', () => {
                state.duration = mediaPlayer.duration;
                document.getElementById('timeTotal').innerText = formatTime(state.duration);
            });

            mediaPlayer.addEventListener('ended', () => {
                state.isPlaying = false;
                document.getElementById('progressSlider').value = 0;
                document.getElementById('timeCurrent').innerText = "0:00";
                updatePlayerUI();
                renderContent();
                handleSkipForward();
            });

            mediaPlayer.addEventListener('error', (e) => {
                console.error("Media element error:", e.target.error);
                state.isPlaying = false;
                updatePlayerUI();
                renderContent();
            });
        }

        // --- Helper & UI Functions ---
        function formatTime(time) {
            if (isNaN(time)) return "0:00";
            const minutes = Math.floor(time / 60);
            const seconds = Math.floor(time % 60);
            return `${minutes}:${seconds < 10 ? '0' : ''}${seconds}`;
        }

        function handleSeek(e) {
            if (!state.currentTrack || !state.duration) return;
            const seekTime = (e.target.value / 100) * state.duration;
            mediaPlayer.currentTime = seekTime;
        }

        function handleVolumeChange(e) {
            const val = parseFloat(e.target.value);
            state.volume = val;
            mediaPlayer.volume = val;
            state.isMuted = val === 0;
            updateVolumeUI();
        }

        function toggleMute() {
            if (state.isMuted) {
                mediaPlayer.volume = state.volume || 0.5;
                state.volume = state.volume || 0.5;
                state.isMuted = false;
            } else {
                mediaPlayer.volume = 0;
                state.isMuted = true;
            }
            updateVolumeUI();
        }

        function updateVolumeUI() {
            const volumeSlider = document.getElementById('volumeSlider');
            const volumeIcon = document.getElementById('volumeIcon');
            
            volumeSlider.value = state.isMuted ? 0 : state.volume;
            if (state.isMuted || state.volume === 0) {
                volumeIcon.className = "ph-fill ph-speaker-none text-xl";
            } else if (state.volume < 0.5) {
                volumeIcon.className = "ph-fill ph-speaker-low text-xl";
            } else {
                volumeIcon.className = "ph-fill ph-speaker-high text-xl";
            }
        }

        function toggleLike(trackId, event) {
            if (event) event.stopPropagation();
            const track = trackCache.get(trackId);
            if (!track) return;

            const isLiked = state.likedTracks.some(t => t.trackId === trackId);
            if (isLiked) {
                state.likedTracks = state.likedTracks.filter(t => t.trackId !== trackId);
            } else {
                state.likedTracks.push(track);
            }
            
            localStorage.setItem('likedTracks', JSON.stringify(state.likedTracks));
            renderContent();
            updatePlayerUI();
        }

        function toggleSidebar(force) {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebarOverlay');
            
            if (force === true || sidebar.classList.contains('-translate-x-full')) {
                sidebar.classList.remove('-translate-x-full');
                overlay.classList.remove('hidden-safely');
            } else {
                sidebar.classList.add('-translate-x-full');
                overlay.classList.add('hidden-safely');
            }
        }

        function navigate(view) {
            state.currentView = view;
            toggleSidebar(false);
            
            // Update Nav styling
            ['navHome', 'navSearch', 'navLibrary'].forEach(id => {
                const el = document.getElementById(id);
                el.classList.remove('bg-gray-800/50', 'text-white');
                if ((view === 'search' && id === 'navSearch') || 
                    (view === 'library' && id === 'navLibrary') ||
                    (view === 'search' && !state.query && id === 'navHome')) {
                    el.classList.add('bg-gray-800/50', 'text-white');
                }
            });

            if (view === 'search') {
                if (state.query === '') fetchMusic('top hits');
                else renderContent();
                setTimeout(() => searchInput.focus(), 100);
            } else if (view === 'home') {
                state.query = '';
                searchInput.value = '';
                fetchMusic('top hits');
            } else {
                renderContent();
            }
        }

        function setSearchType(type) {
            state.searchType = type;
            const btnSong = document.getElementById('btnTypeSong');
            const btnVideo = document.getElementById('btnTypeVideo');
            
            if (type === 'song') {
                btnSong.className = "px-3 py-1.5 text-xs font-medium rounded-full transition-colors bg-gray-600 text-white";
                btnVideo.className = "px-3 py-1.5 text-xs font-medium rounded-full transition-colors text-gray-400 hover:text-white";
            } else {
                btnVideo.className = "px-3 py-1.5 text-xs font-medium rounded-full transition-colors bg-gray-600 text-white";
                btnSong.className = "px-3 py-1.5 text-xs font-medium rounded-full transition-colors text-gray-400 hover:text-white";
            }
            
            fetchMusic(state.query || 'top hits', type);
        }

        function toggleVideoVisibility(forceState) {
            if (forceState !== undefined) {
                state.showVideo = forceState;
            } else {
                state.showVideo = !state.showVideo;
            }
            updatePlayerUI();
        }

        // --- Rendering ---
        function renderError(msg) {
            contentArea.innerHTML = `<div class="flex items-center justify-center h-full text-gray-400">${msg}</div>`;
        }

        function updatePlayerUI() {
            const playPauseIcon = document.getElementById('playPauseIcon');
            const btnPlayPause = document.getElementById('btnPlayPause');
            const btnNext = document.getElementById('btnNext');
            const btnPrev = document.getElementById('btnPrev');
            const progressSlider = document.getElementById('progressSlider');
            const nowPlayingInfo = document.getElementById('nowPlayingInfo');
            const videoContainer = document.getElementById('videoContainer');

            if (state.isPlaying) {
                playPauseIcon.className = "ph-fill ph-pause text-lg";
                playPauseIcon.classList.remove('ml-0.5'); // center pause
            } else {
                playPauseIcon.className = "ph-fill ph-play ml-0.5 text-lg";
            }

            if (state.currentTrack) {
                btnPlayPause.disabled = false;
                btnNext.disabled = false;
                btnPrev.disabled = false;
                progressSlider.disabled = false;
                
                const isLiked = state.likedTracks.some(t => t.trackId === state.currentTrack.trackId);
                const isVideo = state.currentTrack.kind === 'music-video';
                
                nowPlayingInfo.innerHTML = `
                    <img src="${state.currentTrack.artworkUrl100}" alt="Album Art" class="w-12 h-12 rounded shadow-sm hidden sm:block object-cover" />
                    <div class="min-w-0">
                        <div class="text-sm font-semibold text-white truncate">${escapeHtml(state.currentTrack.trackName)}</div>
                        <div class="text-xs text-gray-400 truncate hover:text-white hover:underline cursor-pointer" onclick="fetchArtistProfile(${state.currentTrack.artistId}, '${escapeHtml(state.currentTrack.artistName)}')">
                            ${escapeHtml(state.currentTrack.artistName)}
                        </div>
                    </div>
                    <button onclick="toggleLike(${state.currentTrack.trackId})" class="ml-2 transition-colors hidden sm:block ${isLiked ? 'text-green-500' : 'text-gray-400 hover:text-white'}">
                        <i class="ph-fill ph-heart text-lg"></i>
                    </button>
                    ${isVideo ? `
                    <button onclick="toggleVideoVisibility()" class="ml-2 transition-colors hidden sm:block ${state.showVideo ? 'text-green-500' : 'text-gray-400 hover:text-white'}" title="Toggle Video Player">
                        <i class="ph-fill ph-video-camera text-lg"></i>
                    </button>
                    ` : ''}
                `;

                if (isVideo && state.showVideo) {
                    videoContainer.className = "fixed bottom-24 right-4 md:right-8 w-64 md:w-80 aspect-video bg-black rounded-lg shadow-[0_0_40px_rgba(0,0,0,0.5)] border border-gray-700 z-50 overflow-hidden transition-all duration-300 opacity-100 translate-y-0 pointer-events-auto";
                } else {
                    videoContainer.className = "fixed bottom-24 right-4 md:right-8 w-64 md:w-80 aspect-video bg-black rounded-lg shadow-[0_0_40px_rgba(0,0,0,0.5)] border border-gray-700 z-50 overflow-hidden transition-all duration-300 opacity-0 translate-y-10 pointer-events-none";
                }
            } else {
                btnPlayPause.disabled = true;
                btnNext.disabled = true;
                btnPrev.disabled = true;
                progressSlider.disabled = true;
                nowPlayingInfo.innerHTML = `<div class="text-xs text-gray-500">Select a song to start listening</div>`;
                videoContainer.className = "fixed bottom-24 right-4 md:right-8 w-64 md:w-80 aspect-video bg-black rounded-lg shadow-[0_0_40px_rgba(0,0,0,0.5)] border border-gray-700 z-50 overflow-hidden transition-all duration-300 opacity-0 translate-y-10 pointer-events-none";
            }
        }

        function renderContent() {
            if (state.loading) {
                contentArea.innerHTML = `
                    <div class="flex flex-col items-center justify-center h-full text-gray-400 gap-3">
                        <i class="ph ph-spinner text-3xl animate-spin text-green-500"></i>
                        <p class="animate-pulse">Finding unblocked tracks...</p>
                    </div>`;
                return;
            }

            let html = '<div class="pb-24">';

            if (state.currentView === 'library') {
                html += `
                    <div class="mb-8">
                        <div class="flex items-end gap-5">
                            <div class="w-24 h-24 bg-gradient-to-br from-purple-600 to-blue-500 rounded flex items-center justify-center shadow-lg">
                                <i class="ph-fill ph-heart text-4xl text-white"></i>
                            </div>
                            <div class="mb-1">
                                <h1 class="text-4xl font-extrabold text-white mb-2 tracking-tight">Liked Songs</h1>
                                <span class="text-gray-300 text-sm font-medium">
                                    ${state.likedTracks.length} ${state.likedTracks.length === 1 ? 'song' : 'songs'}
                                </span>
                            </div>
                        </div>
                    </div>
                `;
            } else if (state.currentView === 'artist' && state.selectedArtist) {
                html += `
                    <div class="mb-8">
                        <button onclick="navigate('search')" class="mb-6 flex items-center text-sm text-gray-400 hover:text-white transition-colors">
                            <i class="ph ph-arrow-left mr-1"></i> Back to results
                        </button>
                        <div class="flex items-end gap-5">
                            <div class="w-24 h-24 bg-[#282828] rounded-full flex items-center justify-center shadow-lg border border-gray-700">
                                <i class="ph-fill ph-music-notes text-4xl text-gray-400"></i>
                            </div>
                            <div class="mb-1">
                                <h1 class="text-4xl font-extrabold text-white mb-2 tracking-tight">${escapeHtml(state.selectedArtist.artistName)}</h1>
                                ${state.selectedArtist.primaryGenreName ? `<span class="px-3 py-1 bg-gray-800 text-gray-300 text-xs rounded-full font-medium border border-gray-700">${escapeHtml(state.selectedArtist.primaryGenreName)}</span>` : ''}
                            </div>
                        </div>
                        <h2 class="text-xl font-bold text-white mt-10 mb-4">Top Songs</h2>
                    </div>
                `;
            } else {
                let title = "Popular Right Now";
                if (state.query) title = `Results for "${escapeHtml(state.query)}"`;
                else if (state.searchType === 'musicVideo') title = "Popular Videos";
                
                html += `<h2 class="text-2xl font-bold text-white mb-6">${title}</h2>`;
            }

            html += `<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4">`;

            const activeList = getActiveList();

            if (state.currentView === 'library' && activeList.length === 0) {
                 html += `
                    <div class="col-span-full py-20 flex flex-col items-center justify-center text-gray-400">
                      <i class="ph-fill ph-music-notes text-5xl mb-4 opacity-50"></i>
                      <p class="text-lg font-medium text-white mb-2">Songs you like will appear here</p>
                      <p class="text-sm">Save songs by tapping the heart icon.</p>
                      <button onclick="navigate('search')" class="mt-6 px-6 py-2 bg-white text-black font-bold rounded-full hover:scale-105 transition-transform">
                        Find songs
                      </button>
                    </div>`;
            } else {
                activeList.forEach(track => {
                    const isCurrent = state.currentTrack?.trackId === track.trackId;
                    const isLiked = state.likedTracks.some(t => t.trackId === track.trackId);
                    const imageSrc = track.artworkUrl100 ? track.artworkUrl100.replace('100x100', '300x300') : '';
                    
                    let overlayHtml = '';
                    if (isCurrent && state.isPlaying) {
                        overlayHtml = `
                            <div class="flex gap-0.5 h-4 items-end">
                               <div class="w-1 bg-green-500 animate-bounce-audio-1 h-full"></div>
                               <div class="w-1 bg-green-500 animate-bounce-audio-2 h-2/3"></div>
                               <div class="w-1 bg-green-500 animate-bounce-audio-3 h-4/5"></div>
                            </div>
                        `;
                    } else {
                        overlayHtml = `<i class="ph-fill ph-play text-white text-xl"></i>`;
                    }

                    html += `
                        <div onclick="playTrackById(${track.trackId})" class="group flex items-center gap-4 p-3 rounded-md hover:bg-white/10 transition-colors cursor-pointer ${isCurrent ? 'bg-white/10' : ''}">
                            <div class="relative w-12 h-12 flex-shrink-0 bg-gray-800 rounded shadow-md overflow-hidden">
                                <img src="${imageSrc}" alt="Art" class="w-full h-full object-cover" />
                                <div class="absolute inset-0 bg-black/40 items-center justify-center ${isCurrent ? 'flex' : 'hidden group-hover:flex'}">
                                    ${overlayHtml}
                                </div>
                            </div>
                            <div class="flex-1 min-w-0">
                                <h3 class="text-sm font-semibold truncate flex items-center gap-2 ${isCurrent ? 'text-green-500' : 'text-white'}">
                                    ${escapeHtml(track.trackName)}
                                    ${track.kind === 'music-video' ? '<i class="ph-fill ph-video-camera text-gray-400" title="Music Video"></i>' : ''}
                               </h3>
                               <p class="text-xs text-gray-400 truncate mt-0.5 hover:text-white hover:underline cursor-pointer inline-block" onclick="event.stopPropagation(); fetchArtistProfile(${track.artistId}, '${escapeHtml(track.artistName)}')">
                                   ${escapeHtml(track.artistName)}
                               </p>
                            </div>
                            <button onclick="toggleLike(${track.trackId}, event)" class="p-2 rounded-full hover:bg-white/10 transition-colors ${isLiked ? 'opacity-100' : 'opacity-0 group-hover:opacity-100'}">
                                <i class="ph-fill ph-heart ${isLiked ? 'text-green-500' : 'text-gray-400 hover:text-white'} text-base"></i>
                            </button>
                        </div>
                    `;
                });
            }

            html += `</div></div>`;
            contentArea.innerHTML = html;
        }

        function escapeHtml(unsafe) {
            if (!unsafe) return '';
            return unsafe
                 .toString()
                 .replace(/&/g, "&amp;")
                 .replace(/</g, "&lt;")
                 .replace(/>/g, "&gt;")
                 .replace(/"/g, "&quot;")
                 .replace(/'/g, "&#039;");
        }
    </script>
</body>
</html>
